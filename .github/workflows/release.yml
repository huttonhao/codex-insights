name: Build and Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-insights-build
          path: dist/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p release/codex-insights
          cp -R .codex-plugin .mcp.json README.md package.json package-lock.json tsconfig.json vitest.config.ts packages skills dist release/codex-insights/
          tar -czf "codex-insights-${GITHUB_REF_NAME}.tar.gz" -C release codex-insights

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "codex-insights-${{ github.ref_name }}.tar.gz"
          generate_release_notes: true
